<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Grid Calculator</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <main class="calculator">
        <output class="calculator-display" id="display">0</output>
        
        <section class="calculator-keys" id="key-grid">
            <button class="key-clear" data-action="clear">C</button>
            <button class="key-operator" data-action="operator" data-val="/">/</button>
            <button class="key-operator" data-action="operator" data-val="*">&times;</button>
            <button class="key-operator" data-action="operator" data-val="-">-</button>

            <button class="key-number" data-val="7">7</button>
            <button class="key-number" data-val="8">8</button>
            <button class="key-number" data-val="9">9</button>
            <button class="key-operator key-tall" data-action="operator" data-val="+">+</button>

            <button class="key-number" data-val="4">4</button>
            <button class="key-number" data-val="5">5</button>
            <button class="key-number" data-val="6">6</button>

            <button class="key-number" data-val="1">1</button>
            <button class="key-number" data-val="2">2</button>
            <button class="key-number" data-val="3">3</button>
            <button class="key-equal key-tall" data-action="calculate">=</button>

            <button class="key-number key-wide" data-val="0">0</button>
            <button class="key-number" data-action="decimal" data-val=".">.</button>
        </section>
    </main>

    <script src="scripts/calculator.js"></script>
</body>
</html>
